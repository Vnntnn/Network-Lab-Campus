name: ncmp-smoke
mgmt:
  network: ncmp-smoke-mgmt
  ipv4-subnet: 172.30.30.0/24

topology:
  nodes:
    probe-a:
      kind: linux
      image: ghcr.io/srl-labs/network-multitool:latest
      mgmt-ipv4: 172.30.30.11

    probe-b:
      kind: linux
      image: ghcr.io/srl-labs/network-multitool:latest
      mgmt-ipv4: 172.30.30.12

  links:
    - endpoints: ["probe-a:eth1", "probe-b:eth1"]