services:
  backend:
    build:
      context: .
      dockerfile: deploy/docker/backend.Dockerfile
    container_name: network-platform-backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite+aiosqlite:///./data/nexus_edu.db}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://127.0.0.1}
    volumes:
      - backend_data:/app/data
    expose:
      - "8000"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: deploy/docker/frontend.Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
        VITE_WS_BASE_URL: ${VITE_WS_BASE_URL:-}
    container_name: network-platform-frontend
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_data:
